name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # Updated to Node.js 24 compatible

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4   # Updated to Node.js 24 compatible
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
