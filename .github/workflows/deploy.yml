name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 now

    steps:
      # ✅ Checkout repository with full history
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Fixes git 128 errors
          submodules: true      # Only if you use submodules

      # ✅ Setup Node.js (latest action version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24      # Move to Node.js 24 now
          cache: 'npm'

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Build project
      - name: Build project
        run: npm run build
